name: Elderly Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GPR_TOKEN }}
        run: ./gradlew assembleOfflineStableDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InstallerX-Elderly-Debug
          path: app/build/outputs/apk/offlineStable/debug/*.apk
